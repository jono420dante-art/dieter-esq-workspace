# ED-GEERDES — deploy to Vercel on push to main.
#
# Add repository secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — from `vercel link` → .vercel/project.json
#   VERCEL_PROJECT_ID  — same file
#
# Local: `npm run deploy:vercel` from repo root (uses linked project or prompts once).
name: ED-GEERDES Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify Vite build
        working-directory: mureka-clone
        run: |
          npm ci
          npm run build
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
