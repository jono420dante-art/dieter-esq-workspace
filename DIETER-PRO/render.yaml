services:
  - type: web
    name: dieter-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Dieter FastAPI origin (no trailing slash), e.g. https://dieter-beat-lab.onrender.com
      - key: DIETER_FASTAPI_URL
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
