<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3fd2ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff8c1e" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="18" fill="#000" fill-opacity="0.18"/>
  <rect x="18" y="18" width="1164" height="264" rx="16" fill="url(#g)" fill-opacity="0.14"/>

  <!-- Transport -->
  <g transform="translate(36 38)">
    <text x="0" y="0" fill="rgba(234,240,255,0.82)" font-family="Inter, system-ui" font-size="14" font-weight="700">TRANSPORT</text>
    <g transform="translate(0 18)">
      <rect x="0" y="0" width="260" height="44" rx="12" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.12)"/>
      <circle cx="34" cy="22" r="10" fill="rgba(63,210,255,0.45)"/>
      <polygon points="70,14 70,30 86,22" fill="rgba(234,240,255,0.9)"/>
      <rect x="108" y="14" width="6" height="16" rx="2" fill="rgba(234,240,255,0.75)"/>
      <rect x="120" y="14" width="6" height="16" rx="2" fill="rgba(234,240,255,0.75)"/>
      <text x="152" y="27" fill="rgba(234,240,255,0.65)" font-family="Inter, system-ui" font-size="12" font-weight="700">BAR 1</text>
      <text x="206" y="27" fill="rgba(234,240,255,0.65)" font-family="Inter, system-ui" font-size="12" font-weight="700">120 BPM</text>
    </g>
  </g>

  <!-- Mixer faders -->
  <g transform="translate(340 38)">
    <text x="0" y="0" fill="rgba(234,240,255,0.82)" font-family="Inter, system-ui" font-size="14" font-weight="700">MIXER</text>
    <g transform="translate(0 18)">
      <rect x="0" y="0" width="824" height="244" rx="16" fill="rgba(0,0,0,0.20)" stroke="rgba(255,255,255,0.12)"/>

      <!-- fader columns -->
      <g transform="translate(24 24)">
        <!-- 8 channels -->
        <g>
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="88" width="20" height="10" rx="5" fill="rgba(63,210,255,0.55)" filter="url(#blur)"/>
          <rect x="33" y="88" width="20" height="10" rx="5" fill="rgba(63,210,255,0.75)"/>
          <text x="18" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">DRUMS</text>
        </g>

        <g transform="translate(96 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="98" width="20" height="10" rx="5" fill="rgba(63,210,255,0.75)"/>
          <text x="22" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">BASS</text>
        </g>

        <g transform="translate(192 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="80" width="20" height="10" rx="5" fill="rgba(63,210,255,0.75)"/>
          <text x="24" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">KEYS</text>
        </g>

        <g transform="translate(288 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="70" width="20" height="10" rx="5" fill="rgba(63,210,255,0.75)"/>
          <text x="20" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">LEAD</text>
        </g>

        <g transform="translate(384 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="90" width="20" height="10" rx="5" fill="rgba(63,210,255,0.75)"/>
          <text x="18" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">VOCALS</text>
        </g>

        <g transform="translate(480 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="110" width="20" height="10" rx="5" fill="rgba(63,210,255,0.75)"/>
          <text x="30" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">FX</text>
        </g>

        <g transform="translate(576 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="76" width="20" height="10" rx="5" fill="rgba(255,140,30,0.75)"/>
          <text x="22" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">BUS</text>
        </g>

        <g transform="translate(672 0)">
          <rect x="0" y="0" width="86" height="196" rx="14" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
          <rect x="40" y="20" width="6" height="128" rx="3" fill="rgba(255,255,255,0.14)"/>
          <rect x="33" y="64" width="20" height="10" rx="5" fill="rgba(255,140,30,0.85)"/>
          <text x="20" y="186" fill="rgba(234,240,255,0.7)" font-family="Inter, system-ui" font-size="11" font-weight="700">MASTER</text>
        </g>
      </g>
    </g>
  </g>
</svg>

