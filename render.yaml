# Render Blueprint (repository root) — see dieter-backend/DEPLOY_RENDER.md
# Build context: repository root (must contain mureka-clone/ and dieter-backend/).
services:
  - type: web
    name: dieter-beat-lab
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./dieter-backend/Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DIETER_AUDIO_ENGINE
        value: procedural
      # Comma-separated origins if you restrict CORS (default *). Example for Vercel-only UI:
      # https://mureka-clone.vercel.app,https://*.vercel.app
      - key: DIETER_CORS_ORIGINS
        value: "*"
      # Set in Render Dashboard → Environment (secrets): Mureka cloud generation
      - key: MUREKA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Vocal Engine (Bark + RVC API) — optional second service; remove if you do not need it.
  - type: web
    name: vocal-engine-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./vocal-engine-app/backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: VOCAL_CORS_ORIGINS
        value: "*"
      - key: RVC_DEVICE
        value: "cpu"
