# Dieter stack — repo root
#
# Default (API + static studio + tRPC):
#   mkdir -p dieter-backend/voices/man dieter-backend/voices/woman
#   (storage is created automatically; compose mounts dieter-backend/storage)
#   docker compose build && docker compose up
#   → Studio + API: http://localhost:8080  ·  GET /api/health  ·  tRPC: /trpc
#
# Optional MusicGen / Audiocraft (NVIDIA Container Toolkit + GPU; omit --profile on CPU-only hosts):
#   docker compose --profile music up
#   → http://localhost:8000 (set DIETER_PUBLIC_API_ORIGIN as needed)
#
# Hot-reload Vite against containers (API proxied to `web`):
#   docker compose --profile dev up
#   → http://localhost:5173
#
# Lyrics → sung vocals in production: set MUREKA_API_KEY (e.g. in .env) and use POST /api/mureka/song/generate
# on the `web` service — same routes as documented for platform.mureka.ai. A separate "RVC + Tortoise +
# MusicGen in one container" image is not part of this repo; use `dieter-music` + GPU or cloud Mureka.
#
# Slim Mureka worker + tiny Vite UI (ports 3001 / 3000): docker-compose.lyrics-engine.yml

services:
  web:
    build:
      context: .
      dockerfile: dieter-backend/Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_USE_TRPC: "true"
        VITE_TRPC_URL: /trpc
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WEB_CONCURRENCY: "2"
      DIETER_AUDIO_ENGINE: procedural
      DIETER_TRPC_UPSTREAM: http://trpc:8790
      VOICES_DIR: /app/voices
      OUTPUT_DIR: /app/output
      MUREKA_API_KEY: ${MUREKA_API_KEY:-}
    volumes:
      # Host WAV library → GET /api/voices/list (matches app/voices_router.py: dieter-backend/voices)
      - ./dieter-backend/voices:/app/voices
      # Jobs, uploads, generated audio (same path as local uvicorn: dieter-backend/storage)
      - ./dieter-backend/storage:/app/storage
      # Coqui / XTTS model cache and generated vocal files.
      - ./models:/app/models
      - ./output:/app/output
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  trpc:
    build:
      context: ./dieter-backend/dieter-trpc
    environment:
      DIETER_FASTAPI_BASE: http://web:8080
      DIETER_TRPC_PORT: "8790"
    expose:
      - "8790"
    depends_on:
      web:
        condition: service_healthy

  # MusicGen: same image as `web`, different port + storage layout. Requires NVIDIA + `--profile music`.
  dieter-music:
    profiles: ["music"]
    build:
      context: .
      dockerfile: dieter-backend/Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_USE_TRPC: "false"
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      WEB_CONCURRENCY: "1"
      DIETER_AUDIO_ENGINE: procedural
      DIETER_ENABLE_MUSICGEN: "1"
      DIETER_PUBLIC_API_ORIGIN: "http://localhost:8000"
      VOICES_DIR: /app/voices
      OUTPUT_DIR: /app/output
      MUREKA_API_KEY: ${MUREKA_API_KEY:-}
    volumes:
      - ./output:/app/storage
      - ./voices:/app/voices
      - ./models:/app/models
      - ./output:/app/output
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Vite dev server; proxies /api and /voices to `web` (set API_PROXY_TARGET in container).
  vite-dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mureka-clone:/app
      - vite_dev_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://web:8080
      TRPC_PROXY_TARGET: http://trpc:8790
    command: >-
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      web:
        condition: service_healthy

volumes:
  vite_dev_node_modules:
