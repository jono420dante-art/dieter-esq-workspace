# Local stack: DIETER API (ffmpeg + librosa) + optional GPU sidecars.
# Usage from dieter-backend/:  docker compose -f docker-compose.local.yml up -d dieter-api
#
# Add RVC / Tortoise services from upstream repos (images are not pinned here).

services:
  dieter-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - dieter-storage:/app/storage
      - dieter-data:/app/data
    environment:
      - PORT=8787
      - DIETER_AUDIO_ENGINE=procedural

  # Uncomment and point to your image after you build RVC-WebUI:
  # rvc:
  #   image: your-registry/rvc-webui:latest
  #   gpus: all
  #   ports:
  #     - "7865:7865"
  #   volumes:
  #     - rvc-weights:/models

  # tortoise:
  #   build: ./third_party/tortoise-tts
  #   ports:
  #     - "7866:7866"

volumes:
  dieter-storage: {}
  dieter-data: {}
  rvc-weights: {}
